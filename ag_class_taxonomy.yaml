# ── AGRI-FORGE Generation Priority ─────────────────────────────
# For a 1,000 image batch, distribute roughly:
#
#   gray_leaf_spot:            120 images (most common corn disease in Ohio)
#   northern_corn_leaf_blight: 100 images
#   common_rust:                80 images
#   sudden_death_syndrome:      80 images
#   frogeye_leaf_spot:          70 images
#   nitrogen_deficiency:       100 images (very common, high value)
#   water_stress:              100 images (very common, high value)
#   weed_pressure:              80 images
#   stand_gap:                  70 images
#   ponding:                    60 images
#   healthy:                   140 images (need strong negative class)
#
# Total: 1,000 images
#
# Rationale:
#   - Healthy needs the most samples because it's the negative class
#     the model must learn to NOT flag
#   - Disease classes get more weight than mechanical classes because
#     disease is what farmers lose money on
#   - Nitrogen and water stress are very common and high-value detections
# ═══════════════════════════════════════════════════════════════

# ── Scene Variance Parameters for AGRI-FORGE ───────────────────
# Each image should vary these parameters:
#
# Altitude simulation: 15m, 20m, 25m, 30m, 40m (affects apparent size)
# Time of day / lighting: morning golden, midday harsh, overcast flat, late afternoon
# Growth stage: early (V3-V6), mid (V8-VT), late (R1-R5)
# Severity: light (5-10% of frame affected), moderate (15-30%), heavy (40%+)
# Camera angle: nadir (straight down), slight oblique (10-15 degrees)
# Background: clean field, weedy field edge, tree line visible, equipment in frame
# Weather effect: dry conditions, after rain (wet foliage), morning dew
#
# The agri_forge_description field above gives Cosmos the text prompt
# for generating visually realistic variants of each class.
